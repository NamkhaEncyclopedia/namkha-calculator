repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: no-commit-to-branch  # block direct commits to main; bypass: SKIP=no-commit-to-branch git commit
        args: [--branch, main]
      - id: check-ast          # catch Python syntax errors
      - id: check-toml         # validate pyproject.toml
      - id: check-yaml
      - id: end-of-file-fixer
        exclude: '^src/namkha_calculator/(tzdata|basemaps)/'  # vendored data, kept byte-for-byte
      - id: trailing-whitespace
        exclude: '^src/namkha_calculator/(tzdata|basemaps)/'  # vendored data, kept byte-for-byte
      - id: check-merge-conflict
      - id: debug-statements   # catch leftover pdb/breakpoint()
      - id: check-added-large-files
        # ephemeris and vendored basemaps/tzdata are intentionally large
        exclude: '(\.bsp$|^src/namkha_calculator/(tzdata|basemaps)/)'

  - repo: https://github.com/psf/black
    rev: 25.1.0
    hooks:
      - id: black

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.6
    hooks:
      - id: ruff
        args: [--fix]
